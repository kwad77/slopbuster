  <text x="118" y="1017" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" fill="#64748B">Command</text>
  <rect x="186" y="1006" width="12" height="12" rx="3" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.5"/>
  <text x="204" y="1017" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" fill="#64748B">Gate / Circuit Breaker</text>
  <rect x="316" y="1006" width="12" height="12" rx="3" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/>
  <text x="334" y="1017" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" fill="#64748B">Artifact / Output</text>
  <rect x="432" y="1006" width="12" height="12" rx="3" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1.5"/>
  <text x="450" y="1017" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" fill="#64748B">Stewardship</text>
