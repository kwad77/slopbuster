  <rect x="100" y="958" width="600" height="42" rx="10"
    fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="400" y="977" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="12" font-weight="700" fill="#15803D">/sb:export · Compliance Evidence Pack</text>
  <text x="400" y="993" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="10" fill="#64748B">All Change Records aggregated · SOC 2 · HIPAA · FedRAMP formatted output</text>

  <!-- DONE -->
  <rect x="280" y="1008" width="240" height="0" rx="0" fill="none"/>
  <!-- (done text inline with export to save space) -->

  <!-- ── LEGEND ── -->
