  <rect x="100" y="302" width="600" height="90" rx="10"
    fill="#FFF1F2" stroke="#FECDD3" stroke-width="2" filter="url(#sh)"/>
  <rect x="100" y="302" width="600" height="4" rx="2" fill="#F43F5E"/>
  <text x="400" y="328" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="13" font-weight="700" fill="#9F1239">Domain Teams Write Steward Files</text>
  <line x1="130" y1="336" x2="670" y2="336" stroke="#FECDD3" stroke-width="1"/>
  <text x="400" y="355" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
