  <text x="400" y="384" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="10" fill="#64748B">When the senior engineer leaves, their Gate questions don't leave with them</text>

  <!-- Arrow -->
  <line x1="400" y1="392" x2="400" y2="410" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── JOINING FORK ── -->
  <!-- Fork label -->
  <text x="400" y="425" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="10" fill="#94A3B8" font-style="italic">Joining mid-project?</text>

  <!-- Left branch: Resume -->
  <line x1="400" y1="428" x2="400" y2="432" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="200" y1="432" x2="600" y2="432" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="200" y1="432" x2="200" y2="450" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="600" y1="432" x2="600" y2="450" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- YES branch label -->
  <text x="200" y="447" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
