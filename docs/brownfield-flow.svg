  <text x="400" y="695" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" fill="#92400E">Existing integrations not always documented — blast radius is harder to know</text>
  <text x="400" y="715" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" fill="#92400E">Active stewards inject domain questions · DBA · Security · Network</text>
  <text x="400" y="731" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" font-weight="600" fill="#C2410C">Risk tier · HIGH/CRITICAL common · routing to tech lead or ARB</text>
  <text x="400" y="748" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="10" fill="#B45309">approved_by required for HIGH · blocks for CRITICAL until set</text>

  <!-- Arrow -->
  <line x1="400" y1="772" x2="400" y2="790" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

