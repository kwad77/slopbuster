  <line x1="130" y1="658" x2="670" y2="658" stroke="#FED7AA" stroke-width="1"/>
  <text x="400" y="678" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
