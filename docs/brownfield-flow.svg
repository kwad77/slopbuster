<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1020" width="800" height="1020">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94A3B8"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#F87171"/>
    </marker>
    <filter id="sh" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.07"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="1020" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="17" font-weight="700" fill="#0F172A" letter-spacing="-0.3">Brownfield Workflow</text>
  <text x="400" y="52" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" fill="#64748B">Dropping governance into an existing codebase — without stopping what's in flight</text>

  <!-- ── START ── -->
  <rect x="260" y="68" width="280" height="40" rx="20"
    fill="#1E293B" filter="url(#sh)"/>
  <text x="400" y="93" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="13" font-weight="600" fill="#F8FAFC">Existing Codebase</text>

  <!-- Arrow -->
  <line x1="400" y1="108" x2="400" y2="126" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── INSTALL ── -->
  <rect x="100" y="128" width="600" height="76" rx="10"
    fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5" filter="url(#sh)"/>
  <text x="400" y="152" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="13" font-weight="700" fill="#1D4ED8">Install — Non-Destructive</text>
  <text x="400" y="170" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" fill="#3B82F6">npx slopbuster --all · no existing config overwritten · works alongside current tooling</text>
  <text x="400" y="186" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" fill="#64748B">Auto-detects Claude Code · VS Code · Cursor · installs to each</text>

  <!-- Arrow -->
  <line x1="400" y1="204" x2="400" y2="222" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── INIT ── -->
  <rect x="100" y="224" width="600" height="58" rx="10"
    fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5" filter="url(#sh)"/>
  <text x="400" y="247" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="13" font-weight="700" fill="#1D4ED8">/sb:init · Map Existing Code to Phases</text>
  <text x="400" y="265" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" fill="#64748B">Existing work becomes Phase 1 context · Gate thresholds · routing config</text>

  <!-- Arrow -->
  <line x1="400" y1="282" x2="400" y2="300" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

